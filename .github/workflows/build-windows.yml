name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --name wechat-search --hidden-import=yaml main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wechat-search-windows
          path: |
            dist/wechat-search.exe
            config.example.yaml
            search_list.xlsx
